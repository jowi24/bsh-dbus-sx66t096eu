# see https://gemini.google.com/app/57a97b35bc955b9f?hl=de
# https://github.com/hn/bsh-home-appliances/blob/master/contrib/bsh-dbus-sn66p080eu.yaml

esphome:
  name: geschirrspuler
  friendly_name: Geschirrspüler

external_components:
  - source: github://hn/bsh-home-appliances@master  

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "vaXBdDfNfuPwop4ElIDtold7TbGLxyQXNxv6jA+wzCk="

ota:
  - platform: esphome
    password: "6f06755d31764626b714419976a77bd0"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Geschirrspuler Fallback Hotspot"
    password: "51M4NtffvUCC"

captive_portal:

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

status_led:
  pin:
    number: GPIO06
    inverted: true

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600
  
bshdbus:
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]

binary_sensor:
  - platform: bshdbus
    dest: 0x24
    command: 0x2006
    binary_sensors:
      - id: bsh_dw_rinse_aid_ready
        name: Klarspüler
        device_class: problem
        icon: mdi:glass-cocktail
        lambda: return ((x[0] >> 1) & 0x01);
      - id: bsh_dw_salt
        name: Salz
        device_class: problem
        icon: mdi:shaker-outline
        lambda: return ((x[0] >> 0) & 0x01);
      - id: bsh_dw_door
        name: Tür
        device_class: door
        lambda: return !((x[0] >> 3) & 0x01);
  - platform: bshdbus
    dest: 0x27
    command: 0x2007
    binary_sensors:
      - id: bsh_dw_running
        name: Status
        device_class: running
        lambda: return x[0] == 0x01;

  # 1. Die sichtbaren Haupt-Sensoren (Templates) für Home Assistant
  - platform: template
    name: "Option VarioSpeed"
    id: bsh_opt_variospeed
    icon: mdi:speedometer

  - platform: template
    name: "Option IntensivZone"
    id: bsh_opt_intensivzone
    icon: mdi:pot-steam

  - platform: template
    name: "Option Hygiene"
    id: bsh_opt_hygiene
    icon: mdi:bacteria-outline

  - platform: template
    name: "Option Glanztrocknen"
    id: bsh_opt_glanz
    icon: mdi:shimmer

  # 2. Unsichtbare Hilfssensoren für das Bedienpanel (0x1000 -> Byte 1)
  - platform: bshdbus
    dest: 0x17
    command: 0x1000
    binary_sensors:
      - id: helper_panel_variospeed
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 1 && (x[1] & 0x80) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_variospeed
                state: !lambda "return x;"
                
      - id: helper_panel_intensivzone
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 1 && (x[1] & 0x40) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_intensivzone
                state: !lambda "return x;"
                
      - id: helper_panel_hygiene
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 1 && (x[1] & 0x08) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_hygiene
                state: !lambda "return x;"
                
      - id: helper_panel_glanz
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 1 && (x[1] & 0x02) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_glanz
                state: !lambda "return x;"

  # 3. Unsichtbare Hilfssensoren für das Init/Status-Paket (0x2010 -> Byte 8)
  - platform: bshdbus
    dest: 0x25
    command: 0x2010
    binary_sensors:
      - id: helper_init_variospeed
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 8 && (x[8] & 0x80) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_variospeed
                state: !lambda "return x;"
                
      - id: helper_init_intensivzone
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 8 && (x[8] & 0x40) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_intensivzone
                state: !lambda "return x;"
                
      - id: helper_init_hygiene
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 8 && (x[8] & 0x08) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_hygiene
                state: !lambda "return x;"
                
      - id: helper_init_glanz
        internal: true
        trigger_on_initial_state: true
        lambda: return x.size() > 8 && (x[8] & 0x02) != 0;
        on_state:
          then:
            - binary_sensor.template.publish:
                id: bsh_opt_glanz
                state: !lambda "return x;"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  # Sensor der die Betriebszeit des Mikrokontrollers zeigt
  - platform: uptime
    name: Uptime 
  - platform: bshdbus
    dest: 0x25
    command: 0x2008
    sensors:
      - id: bsh_dw_remain
        name: Restzeit
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];
  - platform: bshdbus
    dest: 0x17
    command: 0x1012
    sensors:
      - id: bsh_dw_delay
        name: Zeitvorwahl
        icon: mdi:timer-sand
        unit_of_measurement: h
        accuracy_decimals: 0
        lambda: return x[1];

text_sensor:
  # 1. Der sichtbare Haupt-Sensor für Home Assistant
  - platform: template
    name: "Ausgewähltes Programm"
    id: bsh_dw_program
    icon: mdi:dishwasher

  # 2. Unsichtbarer Hilfssensor für das Bedienpanel
  - platform: bshdbus
    dest: 0x17
    command: 0x1011
    text_sensors:
      - id: bsh_helper_panel
        internal: true # Versteckt diesen Sensor in Home Assistant
        lambda: |-
          if (x.empty()) return {}; 
          switch (x[0]) {
            case 0x10: return std::string("Auto 35-45°");
            case 0x0D: return std::string("Auto 45-65°");
            case 0x0B: return std::string("Auto 65-75°");
            case 0x0E: return std::string("Eco 50°");
            case 0x11: return std::string("Schnell 45°");
            case 0x12: return std::string("Vorspülen");
            default: return std::string("Unbekannt");
          }
        on_value:
          then:
            - text_sensor.template.publish:
                id: bsh_dw_program
                state: !lambda "return x;"

  # 3. Unsichtbarer Hilfssensor für den Start/Init
  - platform: bshdbus
    dest: 0x25
    command: 0x2010
    text_sensors:
      - id: bsh_helper_init
        internal: true # Versteckt diesen Sensor in Home Assistant
        lambda: |-
          if (x.empty()) return {};
          switch (x[0]) {
            case 0x10: return std::string("Auto 35-45°");
            case 0x0D: return std::string("Auto 45-65°");
            case 0x0B: return std::string("Auto 65-75°");
            case 0x0E: return std::string("Eco 50°");
            case 0x11: return std::string("Schnell 45°");
            case 0x12: return std::string("Vorspülen");
            default: return std::string("Bereit");
          }
        on_value:
          then:
            - text_sensor.template.publish:
                id: bsh_dw_program
                state: !lambda "return x;"
